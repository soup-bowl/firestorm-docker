name: Build Development Image

on:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - root/**
      - branding/**
      - .github/workflows/build.yml
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - tag: [edge, "7", "7.2"]
            version: 7-2-3-80036
          - tag: ["7.1"]
            version: 7-1-13-78266

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Login to GitHub CR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate Docker Tags
        id: meta
        run: |
          {
            echo "sl_tags<<EOF"
            echo '${{ toJson(matrix.tag) }}' | jq -r '.[] | "ghcr.io/${{ github.repository }}:" + .'
            echo "EOF"
            echo "os_tags<<EOF"
            echo '${{ toJson(matrix.tag) }}' | jq -r '.[] | "ghcr.io/${{ github.repository }}:" + . + "-opensim"'
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Build for Second Life
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ${{ steps.meta.outputs.sl_tags }}
          build-args: |
            VERSION=${{ matrix.version }}
            SERVICE=
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build for OpenSimulator
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ${{ steps.meta.outputs.os_tags }}
          build-args: |
            VERSION=${{ matrix.version }}
            SERVICE=OS
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
